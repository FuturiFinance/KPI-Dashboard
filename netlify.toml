[build]
  publish = "."
  functions = "netlify/functions"

[build.environment]
  NODE_VERSION = "18"

[functions]
  node_bundler = "esbuild"

[[redirects]]
  from = "/api/diversification"
  to = "/.netlify/functions/diversification"
  status = 200

[[redirects]]
  from = "/api/diversification-refresh"
  to = "/.netlify/functions/diversification-refresh"
  status = 200

[[redirects]]
  from = "/api/diversification-debug"
  to = "/.netlify/functions/diversification-debug"
  status = 200

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
