[build]
  publish = "."
  functions = "netlify/functions"
  command = "echo 'Build triggered at $(date)'"

[build.environment]
  NODE_VERSION = "18"
  FORCE_REBUILD = "2026-05-04-1340"

[functions]
  node_bundler = "esbuild"

[[redirects]]
  from = "/api/diversification"
  to = "/.netlify/functions/diversification"
  status = 200

[[redirects]]
  from = "/api/diversification-refresh"
  to = "/.netlify/functions/refresh"
  status = 200

[[redirects]]
  from = "/api/diversification-debug"
  to = "/.netlify/functions/diversification-debug"
  status = 200

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
